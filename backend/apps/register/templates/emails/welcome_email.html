<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Workspace</title>
</head>

<body
    style="
        margin:0;
        padding:40px;
        background:#f4f4f4;
        font-family:Arial, Helvetica, sans-serif;
    "
>

<div
    style="
        max-width:600px;
        margin:0 auto;
        background:white;
        padding:40px;
        border-radius:10px;
        text-align:center;
    "
>

    <img
        src="cid:welcome_email"
        width="300"
        alt="Welcome"
        style="margin-bottom:10px;"
    >

    <h2
        style="
            margin:10px 0 15px;
            color:#222;
        "
    >
        Welcome to Workspace, {{ username }}!
    </h2>

    <p
        style="
            color:#555;
            line-height:1.6;
            margin-bottom:30px;
        "
    >
        Your account has been successfully created.
        <br><br>
        You can now sign in and start using all Workspace features.
    </p>

    <a
        href="{{ homepage }}"
        style="
            display:inline-block;
            background:#22C55E;
            color:#ffffff;
            padding:14px 28px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            font-size:16px;
        "
    >
        Go to Workspace
    </a>

    <p
        style="
            margin-top:35px;
            color:#888;
            font-size:13px;
            line-height:1.6;
        "
    >
        If you did not create this account, please contact our support team immediately.
    </p>

</div>

</body>
</html>

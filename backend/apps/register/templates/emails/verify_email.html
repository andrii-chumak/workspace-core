<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify your email</title>
</head>

<body
    style="
        margin:0;
        padding:32px;
        background:#f4f4f4;
        font-family:Arial, Helvetica, sans-serif;
    "
>

<div
    style="
        max-width:600px;
        margin:0 auto;
        background:#ffffff;
        padding:32px 40px;
        border-radius:12px;
        text-align:center;
    "
>

    <img
        src="cid:verify_image"
        width="320"
        alt="Verify Email"
        style="
            display:block;
            margin:0 auto 12px;
        "
    >

    <h2
        style="
            margin:0 0 14px;
            color:#111827;
            font-size:30px;
        "
    >
        Welcome to Workspace!
    </h2>

    <p
        style="
            color:#555;
            line-height:1.6;
            margin:0 0 28px;
            font-size:16px;
        "
    >
        Thank you for creating an account.<br>
        Please Verify your email by clicking the button below.
    </p>

    <a
        href="{{ verification_link }}"
        style="
            display:inline-block;
            background:#2563EB;
            color:#ffffff;
            padding:14px 32px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            font-size:16px;
        "
    >
        Verify Email
    </a>

    <p
        style="
            margin:28px 0 0;
            color:#888;
            font-size:13px;
        "
    >
        This verification link expires in <strong>15 minutes</strong>.
    </p>

    <hr
        style="
            margin:32px 0 24px;
            border:none;
            border-top:1px solid #eeeeee;
        "
    >

    <p
        style="
            margin:0;
            font-size:13px;
            color:#888;
            line-height:1.6;
        "
    >
        If you didn't create a Workspace account,
        please ignore this email.
    </p>

</div>

</body>
</html>
